<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#065f46"/>

  <!-- Open book body (two pages) -->
  <path
    d="M12 28 C12 28 36 20 50 20 C64 20 88 28 88 28 L88 74 C88 74 64 66 50 66 C36 66 12 74 12 74 Z"
    fill="white"
    fill-opacity="0.95"
  />

  <!-- Center spine -->
  <line x1="50" y1="20" x2="50" y2="66" stroke="#065f46" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Text lines — left page -->
  <path d="M24 37 C30 35 41 34 50 34.5" stroke="#065f46" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M24 46 C30 44 41 43 50 43.5" stroke="#065f46" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M24 55 C30 53 41 52.5 50 53" stroke="#065f46" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Text lines — right page -->
  <path d="M76 37 C70 35 59 34 50 34.5" stroke="#065f46" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M76 46 C70 44 59 43 50 43.5" stroke="#065f46" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M76 55 C70 53 59 52.5 50 53" stroke="#065f46" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Gold bottom ribbon / bookmark -->
  <rect x="44" y="66" width="12" height="14" rx="2" fill="#fbbf24"/>
  <polygon points="44,80 50,76 56,80 56,80 44,80" fill="#065f46" opacity="0.3"/>
</svg>
